*{

padding:0;

body{

  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  font-family:'Poppins',sans-serif;

  overflow-y:auto;
  overflow-x:hidden;


background:
radial-gradient(circle at top left,#ff4fd830 0%,transparent 35%),
radial-gradient(circle at bottom right,#5b7cff25 0%,transparent 35%),
linear-gradient(135deg,#f9fbff,#eef3ff);

position:relative;
}

/* Background Glow */

body::before,
body::after{
content:'';
position:absolute;
width:350px;
height:350px;
border-radius:50%;
filter:blur(90px);
opacity:.25;
animation:float 8s infinite alternate ease-in-out;
}

body::before{
background:#ff4fd8;
top:-120px;
left:-120px;
}

body::after{
background:#5b7cff;
bottom:-120px;
right:-120px;
}

@keyframes float{
0%{
transform:translateY(0px);
}
100%{
transform:translateY(30px);
}
}

/* Card */

.card{
position:relative;
z-index:2;

width:100%;
max-width:430px;

padding:38px 28px;

border-radius:36px;

background:rgba(255,255,255,.72);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.8);

box-shadow:
0 20px 50px rgba(91,124,255,.15),
0 10px 30px rgba(255,79,216,.08);

overflow:hidden;
text-align:center;
}

/* Premium Border */

.card::before{
content:'';
position:absolute;
inset:0;
padding:1px;
border-radius:36px;

background:linear-gradient(
135deg,
rgba(255,79,216,.45),
rgba(91,124,255,.25),
rgba(255,255,255,.8));

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;
}

/* Logo */

.logo-wrap{
position:relative;
width:110px;
height:110px;
margin:auto;
margin-bottom:24px;
}

.logo-wrap::before{
content:'';
position:absolute;
inset:-8px;
border-radius:30px;
background:linear-gradient(135deg,#ff4fd8,#5b7cff);
filter:blur(18px);
opacity:.4;
}

.logo{
position:relative;
width:100%;
height:100%;

border-radius:28px;
overflow:hidden;

background:#fff;

border:3px solid rgba(255,255,255,.8);

box-shadow:
0 10px 25px rgba(91,124,255,.18);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* Badge */

.badge{
display:inline-flex;
align-items:center;
gap:8px;

padding:8px 18px;

border-radius:50px;

background:rgba(91,124,255,.08);

border:1px solid rgba(91,124,255,.12);

color:#44507a;

font-size:12px;
font-weight:600;

margin-bottom:20px;
}

/* Title */

.title{
font-size:36px;
font-weight:800;
line-height:1.2;

background:linear-gradient(to right,#ff4fd8,#5b7cff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:16px;
}

/* Description */

.sub{
font-size:15px;
line-height:1.9;

color:#5f6885;

margin-bottom:30px;
}

/* Button */

.btn{
position:relative;

display:flex;
justify-content:center;
align-items:center;
gap:12px;

width:100%;

padding:17px;

border-radius:60px;

text-decoration:none;

font-size:15px;
font-weight:700;

color:#fff;

background:linear-gradient(135deg,#ff4fd8,#5b7cff);

overflow:hidden;

box-shadow:
0 15px 35px rgba(91,124,255,.25);

transition:.35s;
}

.btn::before{
content:'';

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:rgba(255,255,255,.25);

transform:skewX(-20deg);

transition:.6s;
}

.btn:hover::before{
left:120%;
}

.btn:hover{
transform:translateY(-3px) scale(1.02);
}

/* Features */

.features{
margin-top:24px;

display:flex;
flex-direction:column;
gap:10px;
}

.feature{
padding:12px;

border-radius:18px;

background:rgba(255,255,255,.55);

border:1px solid rgba(91,124,255,.08);

font-size:13px;

color:#5f6885;
}

/* Footer */

.footer{
margin-top:28px;

font-size:11px;

color:#98a2bb;
}

/* Mobile */

@media(max-width:600px){

padding:32px 22px;
border-radius:30px;
}

.title{
font-size:30px;
}

.sub{
font-size:14px;
}

.btn{
padding:15px;
font-size:14px;
}
